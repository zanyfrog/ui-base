<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>UI Layout Tool Demo</title>
    <style>
      body{margin:0;background:#f5f7fb;color:#172033;font:14px/1.45 Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
      main{display:grid;gap:1rem;padding:1rem}
      .editor{display:grid;grid-template-columns:minmax(18rem,1fr) minmax(24rem,2fr);gap:1rem;align-items:start}
      textarea{width:100%;min-height:30rem;padding:.85rem;border:1px solid #bdcbdd;border-radius:8px;font:13px/1.45 ui-monospace,SFMono-Regular,Consolas,monospace;resize:vertical}
      label{display:grid;gap:.45rem;font-weight:800;color:#203b5e}
      input{min-height:2.25rem;border:1px solid #bdcbdd;border-radius:6px;padding:.45rem .6rem;font:inherit}
      .source{display:grid;gap:.8rem;padding:1rem;border:1px solid #d9e2ee;border-radius:8px;background:#fff}
      .actions{display:flex;gap:.5rem}
      button{min-height:2.35rem;border:1px solid #245ea8;border-radius:6px;background:#245ea8;color:#fff;font:inherit;font-weight:800;cursor:pointer}
      @media(max-width:1000px){.editor{grid-template-columns:1fr}}
    </style>
  </head>
  <body>
    <main>
      <p><a href="./editor/">Open the full UI Layout Editor demo</a></p>
      <div class="editor">
        <section class="source">
          <label>File name
            <input id="fileName" value="demo-component.ts">
          </label>
          <label>Source content
            <textarea id="sourceText">export class DemoComponent extends HTMLElement {
  render() {
    this.innerHTML = `
      <section class="demo-shell" data-layout-id="demo-shell" data-layout-role="workspace">
        <header class="demo-header">
          <h1>Layout demo</h1>
          <p>Edit classes, attributes, or static text.</p>
        </header>
        <main class="demo-main">
          ${this.cardMarkup()}
        </main>
      </section>
    `;
  }

  cardMarkup() {
    return `
      <article class="demo-card" data-layout-id="demo-card">
        <h2>Source-backed card</h2>
        <p>This static text can be changed safely.</p>
      </article>
    `;
  }
}

customElements.define('demo-component', DemoComponent);</textarea>
          </label>
          <div class="actions">
            <button id="loadButton" type="button">Load content</button>
          </div>
        </section>
        <uib-layout-manager id="manager"></uib-layout-manager>
      </div>
    </main>
    <script type="module">
      import '../packages/ui-layout/browser/index.js';

      const manager = document.querySelector('#manager');
      const sourceText = document.querySelector('#sourceText');
      const fileName = document.querySelector('#fileName');
      const load = () => {
        manager.fileName = fileName.value;
        manager.sourceText = sourceText.value;
      };
      document.querySelector('#loadButton').addEventListener('click', load);
      manager.addEventListener('ui-layout-save-requested', (event) => {
        sourceText.value = event.detail.updatedText;
      });
      load();
    </script>
  </body>
</html>
