<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>UI Layout Editor Demo</title>
    <style>
      body{margin:0;background:#f5f7fb;color:#172033;font:14px/1.45 Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
      main{display:grid;gap:1rem;padding:1rem}
      header{display:grid;gap:.25rem}
      h1{margin:0;color:#203b5e;font-size:1.35rem}
      p{margin:0;color:#52677f}
      uib-layout-editor{min-height:80vh}
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>UI Layout Editor</h1>
        <p>Open the workspace packages folder, select a supported file, edit layout or JSON structure, and let autosave handle the write.</p>
      </header>
      <uib-layout-editor startfolder="packages/"></uib-layout-editor>
    </main>
    <script type="module">
      import '../../packages/ui-layout/browser/index.js';

      const editor = document.querySelector('uib-layout-editor');

      // Event-provider hooks can be handled by an app shell when browser file
      // system access is unavailable. This demo intentionally uses the current
      // browser file system flow first, then lets the editor show its built-in
      // unsupported message if no provider responds.
      editor.addEventListener('ui-layout-editor-event-logged', (event) => {
        console.debug('[ui-layout-editor]', event.detail.entry);
      });
    </script>
  </body>
</html>
